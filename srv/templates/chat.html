{% extends 'base.html' %}

{% block body %}


<div class="main-container">
    
    <div class="top-controls">
        <span style="font-weight: 600;">Category:</span>
        <select id="categorySelector" onchange="selectCategory()"></select>
    </div>

    <div class="comparison-wrapper">
        <!-- RAG Column 1 -->
        <div class="rag-column">
            <div class="column-header">
                <h3>RAG 1</h3>
                <div class="augmentation-controls">
                    <span>Keyword Augmentation:</span>
                    <label><input type="checkbox" id="lStage1Expansion" checked> Stage 1</label>
                    <label><input type="checkbox" id="lStage2Expansion"> Stage 2</label>
                </div>
            </div>
            <div id="ragA" class="chat-box"></div>
        </div>

        <!-- RAG Column 2 -->
        <div class="rag-column">
            <div class="column-header">
                <h3>RAG 2</h3>
                <div class="augmentation-controls">
                    <span>Keyword Augmentation:</span>
                    <label><input type="checkbox" id="rStage1Expansion" checked> Stage 1</label>
                    <label><input type="checkbox" id="rStage2Expansion" checked> Stage 2</label>
                </div>
            </div>
            <div id="ragB" class="chat-box"></div>
        </div>
    </div>

    <div id="inputArea" class="input-wrapper">
        <textarea id="inputBox" placeholder="Ask a question about world events..."></textarea>
        <div class="button-group">
            <button onclick="submit()">Send Query</button>
            <button id="evalButton" onclick="evaluate_response()" disabled>Evaluate</button>
        </div>
    </div>

</div>

<script>

const States = Object.freeze({
    QUERY_INPUT: "query",
    PROCESSING: "processing"
});

let state = States.QUERY_INPUT;
let selectedCategory = undefined;
let currentJobId = null;

var categories = [];

function addMessage(target, text) {
    const div = document.createElement("div");
    div.innerHTML = text;
    document.getElementById(target).appendChild(div);
    document.getElementById(target).scrollTop = 999999;
}

function clearInput() {
    document.getElementById("inputBox").value = "";
}

function hideInput() {
    document.getElementById("inputArea").style.display = "none";
}

function showInput() {
    document.getElementById("inputArea").style.display = "block";
}

async function loadCategories() {
    const res = await fetch("/api/categories");
    categories = await res.json();
    renderCategories();
}


function renderCategories() {

    container = document.getElementById("categorySelector")
    const allOpt = document.createElement("option");
    allOpt.innerText = "all categories";
    allOpt.value = undefined;
    allOpt.onclick = () => selectCategory();
    container.appendChild(allOpt);

    categories.forEach((c, i) => {
        const opt = document.createElement("option");
        opt.innerText = c;
        opt.value = i;
        opt.style.margin = "3px";
        container.appendChild(opt);
    });
    
    addMessage("ragA", "Welcome to world events chat. Please enter your query:");
    addMessage("ragB", "Welcome to world events chat. Please enter your query:");
}

function selectCategory() {
    addMessage("ragA", "Category chaged to: <b>" + event.target.options[event.target.selectedIndex].text) +"</b>";
    addMessage("ragB", "Category chaged to: <b>" + event.target.options[event.target.selectedIndex].text) +"</b>";

    selectedCategory = event.target.value;
}

let lastQuery = ""

function submit() {
    const text = document.getElementById("inputBox").value;

    if (state === States.QUERY_INPUT) {
        if (!text.trim()) return;

        addMessage("ragA", "<b>You:</b> " + text);
        addMessage("ragB", "<b>You:</b> " + text);

        clearInput();
        startJob(text);

        tot_responses = 0;
        document.getElementById("evalButton").disabled = true;
    }
}

function startJob(query) {
    
    lastQuery = query;

    addMessage("ragA", "Sending job...");
    addMessage("ragB", "Sending job...");

    fetch("/api/events-chat-job", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            query: query,
            stage1: lStage1Expansion.checked,
            stage2: lStage2Expansion.checked,
            mode: "rag",
            ...(selectedCategory !== undefined && {
                category: categories[selectedCategory]
            })
        })
    })
    .then(res => res.json())
    .then(data => handleJobResponse(data, "ragA"));

    fetch("/api/events-chat-job", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            query: query,
            mode: "rag",
            stage1: rStage1Expansion.checked,
            stage2: rStage2Expansion.checked,
            ...(selectedCategory !== undefined && {
                category: categories[selectedCategory]
            })
        })
    })
    .then(res => res.json())
    .then(data => handleJobResponse(data, "ragB"));
}

var lastStatus = null

function handleJobResponse(data, target) {

    if (data.error) {
        addMessage(target, "Error: " + data.error);
        return;
    }

    const jobId = data.jobId;
    addMessage(target, "Job started: " + jobId);

    pollJob(jobId, target);
}

let tot_responses = 0;
let responses = {};

function pollJob(jobId, target) {

    let lastStatus = null;

    const interval = setInterval(() => {

        fetch(`/api/events-chat-job/${jobId}`)
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                addMessage(target, "Error: " + data.error);
                clearInterval(interval);
                return;
            }

            if (data.status && data.status !== lastStatus) {
                addMessage(target, data.status);
                lastStatus = data.status;
            }

            if (data.result) {
                let result = data.result.replace(/\r?\n/g, "<br>");
                addMessage(target, "<p><b>Result:</b></p><p>" + result + "</p>");

                clearInterval(interval);
                // addMessage(target, "<br><br>Ready for next query");
                responses[target] = data.result;
                tot_responses++;

                if (tot_responses == 2) {
                    document.getElementById("evalButton").disabled = false;
                }
            }
        });

    }, 500);
}

function evaluate_response() {
    if (tot_responses != 2) return;
    
    document.getElementById("evalButton").disabled = true;

    fetch("/api/evaluation", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            query: lastQuery,
            response1: responses["ragA"],
            response2: responses["ragB"]
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("EVAL RESPONSE:", JSON.stringify(data));

        if (!data || !data.scores || !data.reasoning) {
            console.error("Invalid evaluation response:", data);
            return;
        }
        const a = data.scores.answer_a;
        const b = data.scores.answer_b;

        const evalA = `
            <hr>
            <b>Evaluation</b><br>
            Overall: ${a.overall}<br>
            Factual: ${a.factual_correctness}<br>
            Completeness: ${a.completeness}<br>
            Relevance: ${a.relevance}<br>
            Clarity: ${a.clarity}<br>
            Hallucination Risk: ${a.hallucination_risk}<br>
            <br><i>${data.reasoning.answer_a}</i>
        `;

        const evalB = `
            <hr>
            <b>Evaluation</b><br>
            Overall: ${b.overall}<br>
            Factual: ${b.factual_correctness}<br>
            Completeness: ${b.completeness}<br>
            Relevance: ${b.relevance}<br>
            Clarity: ${b.clarity}<br>
            Hallucination Risk: ${b.hallucination_risk}<br>
            <br><i>${data.reasoning.answer_b}</i>
        `;

        addMessage("ragA", evalA);
        addMessage("ragB", evalB);
    });    
}

window.onload = loadCategories;



</script>

{% endblock %}
